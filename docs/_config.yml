title: FrcCatalyst
description: Pre-built FRC mechanisms and utilities for CTRE Phoenix 6 + WPILib 2026
baseurl: "/FrcCatalyst"
url: "https://tomas-1226.github.io"

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

# Logo and aux links
logo: "/assets/logo.svg"
aux_links:
  "Tools":
    - "/FrcCatalyst/tools/"
  "Releases":
    - "https://github.com/TomAs-1226/FrcCatalyst/releases"
  "GitHub":
    - "https://github.com/TomAs-1226/FrcCatalyst"

# GitHub + Releases open externally; the Tools link stays in-tab.
aux_links_new_tab: false

# Footer
footer_content: "Built for the FRC community. Go build something awesome."

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Callouts
callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
