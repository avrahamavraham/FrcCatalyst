<!-- Catalyst custom polish layered on top of just-the-docs -->
<style>
  :root {
    --catalyst-accent:    #e94560;
    --catalyst-accent-2:  #f0648a;
    --catalyst-accent-d:  #c0314e;
    --catalyst-blue:      #60a5fa;
    --catalyst-green:     #4ade80;
    --catalyst-amber:     #fbbf24;
    --catalyst-panel:     rgba(255,255,255,0.04);
    --catalyst-border:    rgba(255,255,255,0.08);
  }

  /* ---------- Background aurora ---------- */
  body {
    background-image:
      radial-gradient(900px 600px at 110% -10%, rgba(233,69,96,0.06), transparent 60%),
      radial-gradient(800px 600px at -10% 110%, rgba(96,165,250,0.05), transparent 60%);
  }

  /* ---------- Page titles ---------- */
  .main-content h1:first-child {
    background: linear-gradient(135deg, #e94560 0%, #f0648a 55%, #ffd6e0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.025em;
    font-weight: 800;
  }

  /* ---------- Top page-action buttons (.btn / .btn-primary) ---------- */
  /* These are the buttons on the homepage and other landing pages. The
     just-the-docs defaults are pill-shaped + colourful; we drop the
     gradient in favour of a sharper, flatter look that matches the
     dark-theme aesthetic. */
  .main-content .btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 40px; padding: 0 18px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;
    transition: transform 0.12s ease, border-color 0.12s ease,
                background-color 0.12s ease, box-shadow 0.12s ease;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.03);
    color: inherit !important;
    box-shadow: none !important;
  }
  .main-content .btn:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.28);
    background: rgba(255,255,255,0.06);
    text-decoration: none;
  }

  /* Primary = solid accent, no gaudy gradient. */
  .main-content .btn-primary {
    background: var(--catalyst-accent) !important;
    border-color: var(--catalyst-accent) !important;
    color: #fff !important;
  }
  .main-content .btn-primary:hover {
    background: var(--catalyst-accent-2) !important;
    border-color: var(--catalyst-accent-2) !important;
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(233,69,96,0.25) !important;
  }

  .main-content .btn-outline {
    border-color: rgba(255,255,255,0.16) !important;
    background: transparent !important;
  }
  .main-content .btn-outline:hover {
    border-color: var(--catalyst-accent-2) !important;
    color: var(--catalyst-accent-2) !important;
  }

  /* ---------- Aux nav (top right) ---------- */
  /* Make the Tools / Releases / GitHub buttons consistent + understated. */
  .aux-nav-list .aux-nav-list-item .site-button {
    height: 32px;
    padding: 0 12px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    color: inherit;
    font-weight: 500;
    font-size: 13px;
    margin-right: 6px;
    transition: all 0.12s ease;
  }
  .aux-nav-list .aux-nav-list-item .site-button:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.28);
    color: inherit;
  }
  /* The first aux link (Tools) gets the accent treatment. */
  .aux-nav-list .aux-nav-list-item:first-child .site-button {
    background: var(--catalyst-accent);
    border-color: var(--catalyst-accent);
    color: #fff;
  }
  .aux-nav-list .aux-nav-list-item:first-child .site-button:hover {
    background: var(--catalyst-accent-2);
    border-color: var(--catalyst-accent-2);
    box-shadow: 0 4px 10px rgba(233,69,96,0.25);
  }

  /* ---------- Tables ---------- */
  .main-content table {
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--catalyst-border);
  }
  .main-content table th {
    background: var(--catalyst-panel);
    border-bottom: 1px solid var(--catalyst-border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 12px;
    font-weight: 700;
  }
  .main-content table tr:hover td {
    background: rgba(233,69,96,0.04);
  }

  /* ---------- Code blocks ---------- */
  .main-content pre.highlight,
  .main-content figure.highlight {
    border-radius: 10px;
    border: 1px solid var(--catalyst-border);
    box-shadow: 0 6px 14px rgba(0,0,0,0.28);
  }
  .main-content :not(pre) > code { color: var(--catalyst-accent-2); }

  /* ---------- Hover-lift cards (used by .tool-card and .hero-tool) ---------- */
  .hero-tools, .tool-grid { perspective: 1000px; }
  .hero-tool, .tool-card {
    transform-style: preserve-3d;
    transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease !important;
  }

  /* ---------- Side nav ---------- */
  .nav-list .nav-list-item .nav-list-link.active {
    background-image: linear-gradient(90deg, rgba(233,69,96,0.14), transparent 70%);
    border-left: 3px solid var(--catalyst-accent);
  }
  .nav-list .nav-list-item .nav-list-link:hover {
    background-color: rgba(255,255,255,0.04);
  }

  /* ---------- Callouts ---------- */
  .main-content .note    { box-shadow: 0 0 0 1px rgba(96,165,250,0.22); }
  .main-content .tip     { box-shadow: 0 0 0 1px rgba(74,222,128,0.22); }
  .main-content .warning { box-shadow: 0 0 0 1px rgba(233,69,96,0.30); }

  /* ---------- Scrollbar polish (chromium) ---------- */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--catalyst-accent); }
</style>
